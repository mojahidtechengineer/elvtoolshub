<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Mojahid Tech Engineer</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .box { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 40px; width: 100%; max-width: 380px; }
    h2 { margin: 0 0 6px; font-size: 1.3rem; color: #0f172a; }
    p { margin: 0 0 24px; font-size: 0.85rem; color: #64748b; }
    label { display: block; font-size: 0.85rem; color: #475569; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.9rem; margin-bottom: 16px; box-sizing: border-box; }
    button { width: 100%; padding: 11px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    .error { color: #dc2626; font-size: 0.85rem; margin-top: 12px; display: none; }
  </style>
</head>
<body>
<div class="box">
  <h2>Mojahid Tech Engineer</h2>
  <p>Sign in to access ELV Tools</p>
  <label>Email</label>
  <input type="email" id="email" placeholder="you@example.com" />
  <label>Password</label>
  <input type="password" id="password" placeholder="••••••••" />
  <button onclick="login()">Sign In</button>
  <div class="error" id="error-msg">Invalid email or password.</div>
</div>

<script>
  // ⚠️ REPLACE THESE TWO VALUES WITH YOUR SUPABASE DETAILS
  const SUPABASE_URL = 'https://qwfrysqtbaazcbvpokik.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_PdoMU06siFaUFJv8zwQ7nQ_Kgmg3wiU';

  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await client.auth.signInWithPassword({ email, password });
    if (error) {
      document.getElementById('error-msg').style.display = 'block';
    } else {
      window.location.href = 'index.html'; // redirect to your main page
    }
  }
</script>
</body>
</html>
